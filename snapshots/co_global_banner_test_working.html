      // Clamp and offset only when a small positive top-gap exists.
      if (wrap && wrap.getBoundingClientRect && wrap.style) {
        var wrapTop = Math.round(wrap.getBoundingClientRect().top || 0);
        if (wrapTop > 0 && wrapTop <= 80) {

          wrap.style.setProperty("padding-top", "0", "important");
          wrap.setAttribute("data-smna-wrap-gap-fix", String(-wrapTop));

          wrap.removeAttribute("data-smna-wrap-gap-fix");
        }

  function _stripLegacyCopyrightText(raw) {
    var out = String(raw || "");
    out = out.replace(/copyright\s*(?:\u00a9|c)?\s*2018/ig, "");
    out = out.replace(/0404\s*association\s*co\.,?\s*ltd\.?/ig, "");
    out = out.replace(/all\s*rights\s*reserved\.?/ig, "");
    out = out.replace(/\s{2,}/g, " ").replace(/^[\s\-\|\.,:;]+|[\s\-\|\.,:;]+$/g, "");
    return out;
  }

  function maskLegacyCopyrightSafely() {
    try {
      var linePatt = /copyright[\s\S]{0,140}0404\s*association[\s\S]{0,140}all\s*rights\s*reserved/i;
      var nodes = document.querySelectorAll("#ft .copyright,#footers .copyright,footer .copyright,#ft .copy,#footers .copy,footer .copy,#ft p,#footers p,footer p,#ft span,#footers span,footer span");
      for (var i = 0; i < nodes.length; i += 1) {
        var n = nodes[i];
        if (!n) continue;
        if (n.getAttribute("data-smna-copyright-masked") === "1") continue;
        var t = compactText(n.textContent || "");
        if (!t || t.length > 420) continue;
        if (!linePatt.test(t)) continue;

        var walker = document.createTreeWalker(n, NodeFilter.SHOW_TEXT, null);
        var texts = [];
        while (walker.nextNode()) texts.push(walker.currentNode);
        for (var j = 0; j < texts.length; j += 1) {
          var src = String(texts[j].nodeValue || "");
          var dst = _stripLegacyCopyrightText(src);
          if (dst !== src) texts[j].nodeValue = dst;
        }

        var remain = compactText(n.textContent || "");
        if (linePatt.test(remain)) {
          n.setAttribute("data-smna-copyright-masked", "1");
          n.style.color = "transparent";
          n.style.fontSize = "0";
          n.style.lineHeight = "0";
          n.style.height = "0";
          n.style.margin = "0";
          n.style.padding = "0";
          n.style.border = "0";
          n.style.overflow = "hidden";
          n.style.userSelect = "none";
        }
      }
    } catch (_e) {}
  }

  function removeLegacyHomepageMakerButton() {

        "a[href*='mnahompy']",
        "img[src*='home.png']",
        ".copyright a[target='_blank'] img[src*='home.png']"

      for (var s = 0; s < selectors.length; s += 1) {
        var nodes = document.querySelectorAll(selectors[s]);
        for (var i = 0; i < nodes.length; i += 1) {
          var n = nodes[i];
          if (!n) continue;
          var holder = n.closest ? (n.closest("a,span,p,div") || n) : n;
          if (holder && holder.parentNode) holder.parentNode.removeChild(holder);
        }
      }

      var candidates = document.querySelectorAll("#ft .copyright,#footers .copyright,footer .copyright,#ft .copy,#footers .copy,footer .copy");
      for (var j = 0; j < candidates.length; j += 1) {
        var c = candidates[j];
        if (!c) continue;
        var t = compactText(c.textContent || "");
        if (!/0404\\s*association/i.test(t)) continue;
        c.innerHTML = c.innerHTML
          .replace(/<a[^>]*mnahompy[^>]*>[\s\S]*?<\/a>/ig, "")
          .replace(/<img[^>]*home\.png[^>]*>/ig, "");
      }
    } catch (_e) {}
  }

      var label = compactText(item.label || "");

      links += '<a class="smna-rel-link" href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + "</a>";
    }
    if (!links) return "";
    return '<section id="smna-related-orgs"><strong class="smna-rel-title">유관기관</strong><div class="smna-rel-grid">' + links + "</div></section>";

  function loadVisitorSeedFromStorage() {
    try {
      var d = new Date();
      var day = d.getFullYear() + ("0" + (d.getMonth() + 1)).slice(-2) + ("0" + d.getDate()).slice(-2);
      var keys = ["smna_tc_cache_" + day, "smna_tc_last_nonzero"];
      for (var i = 0; i < keys.length; i += 1) {
        var raw = localStorage.getItem(keys[i]) || sessionStorage.getItem(keys[i]);
        if (!raw) continue;
        var parsed = JSON.parse(raw);
        var ad = Number(parsed && parsed.ad);
        var at = Number(parsed && parsed.at);
        if (!isFinite(ad)) ad = 0;
        if (!isFinite(at)) at = 0;
        ad = ad > 0 ? Math.floor(ad) : 0;
        at = at > 0 ? Math.floor(at) : 0;
        if (!ad && !at) continue;
        return "방문자 오늘 " + ad + " · 누적 " + at;
      }
    } catch (_e) {}
    return "";
  }
