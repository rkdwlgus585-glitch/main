      script.src = API + "/" + endpoint + "/" + encodeURIComponent(NS) + "/" + encodeURIComponent(key) + "?callback=" + cb + "&_=" + Date.now();
      script.onerror = function () { clean(0); };
      (document.head || document.documentElement).appendChild(script);
      window.setTimeout(function () { clean(0); }, 15000);
    });
  }

  function getApiCounts() {
    return Promise.all([jsonpCounter("get", K.ad), jsonpCounter("get", K.at)]).then(function (v) {
      return { ad: N(v[0]), at: N(v[1]) };
    }).catch(function () {
      return { ad: 0, at: 0 };
    });
  }

  function hitDayCountersIfNeeded() {
    try {
      if (!SHOULD_HIT) return;
      if (sessionStorage.getItem(DAY_FLAG_KEY) === DAY) return;
      sessionStorage.setItem(DAY_FLAG_KEY, DAY);
      jsonpCounter("hit", K.ad);
      jsonpCounter("hit", K.at);
      if (!BOT) {
        jsonpCounter("hit", K.hd);
        jsonpCounter("hit", K.ht);
      }
    } catch (_e) {}
  }

  function updateQuickVisitor(ad, at) {
    try {
      var node = document.getElementById("smna-quick-visitor");
      if (!node) return false;
      node.textContent = "방문자 오늘 " + N(ad) + " · 누적 " + N(at);
      return true;
    } catch (_e) {
      return false;
    }
  }

  function resolveCounts() {
    removeTopWhiteGap();
    var legacy = hideLegacyTopBarAndExtract();
    var cached = readCacheCounts();
    var stored = readStoredCounts();
    var ad = N(legacy && legacy.ad) || N(cached && cached.ad) || N(stored && stored.ad);
    var at = N(legacy && legacy.at) || N(cached && cached.at) || N(stored && stored.at);
    return { ad: ad, at: at };
  }

  function render(c) {
    var ad = N(c && c.ad);
    var at = N(c && c.at);
    if (!ad && !at) {
      var curr = readCurrentQuickCounts();
      if (curr) {
        ad = N(curr.ad);
        at = N(curr.at);
      }
    }
    if (!ad && !at) {
      var storedNow = readStoredCounts();
      if (storedNow) {
        ad = N(storedNow.ad);
        at = N(storedNow.at);
      }
    }
    var inQuick = updateQuickVisitor(ad, at);
    if (!inQuick) {
      W("smna-traffic-customer-mini", String(at), "position:fixed;right:10px;bottom:10px;z-index:9998;color:#7a8592;font:600 10px/1.2 sans-serif;letter-spacing:.02em;opacity:.85;pointer-events:none;background:transparent;padding:0;margin:0");
    } else {
      var mini = document.getElementById("smna-traffic-customer-mini");
      if (mini && mini.parentNode) mini.parentNode.removeChild(mini);
    }
    if (ad || at) storeCounts({ ad: ad, at: at });
  }

  var base = resolveCounts();
  render(base);
  hitDayCountersIfNeeded();

  function syncFromApi() {
    getApiCounts().then(function (api) {
      var latest = resolveCounts();
      var merged = {
        ad: N(api && api.ad) || N(latest && latest.ad) || N(base && base.ad),
        at: N(api && api.at) || N(latest && latest.at) || N(base && base.at)
      };
      render(merged);
      writeCacheCounts(merged);
    });
  }

  setTimeout(syncFromApi, 1800);
  setTimeout(syncFromApi, 6000);
  setInterval(syncFromApi, 30000);

  setTimeout(function () { render(resolveCounts()); }, 900);
  setTimeout(function () { render(resolveCounts()); }, 2500);
  setInterval(function () { render(resolveCounts()); }, 12000);
  setTimeout(removeTopWhiteGap, 1200);
  setTimeout(removeTopWhiteGap, 3000);
  setInterval(removeTopWhiteGap, 12000);
})();
</script>
