name: Calculator Internal Autodrive (Remote)

on:
  workflow_dispatch:
    inputs:
      cycles:
        description: "Cycle count for both yangdo/acquisition loops"
        required: false
        default: "2"
      yangdo_iterations_per_cycle:
        description: "Yangdo internal fuzz iterations per cycle"
        required: false
        default: "5000"
      acq_iterations_per_cycle:
        description: "Acquisition internal fuzz iterations per cycle"
        required: false
        default: "500"
      sleep_sec:
        description: "Sleep seconds between cycles"
        required: false
        default: "0.1"
      seed:
        description: "Random seed"
        required: false
        default: "20260304"
      sheet_name:
        description: "Override Google Sheet name (optional)"
        required: false
        default: ""
  schedule:
    # KST 00:15~08:15 (UTC 15:15~23:15) hourly overnight loop
    - cron: "15 15-23 * * *"

permissions:
  contents: read

concurrency:
  group: calculator-internal-autodrive-remote
  cancel-in-progress: true

jobs:
  internal_autodrive:
    if: ${{ github.event_name != 'schedule' || vars.ENABLE_CALCULATOR_INTERNAL_AUTODRIVE_SCHEDULE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: "1"
      TZ: "Asia/Seoul"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine overnight gate
        id: gate
        shell: bash
        run: |
          SHOULD_RUN=true
          KST_NOW="$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %z')"
          KST_DATE="$(TZ=Asia/Seoul date '+%Y-%m-%d')"
          KST_HOUR="$(TZ=Asia/Seoul date '+%H')"
          TARGET_DATE="${{ vars.CALCULATOR_AUTODRIVE_DATE_KST }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ -n "${TARGET_DATE}" ] && [ "${KST_DATE}" != "${TARGET_DATE}" ]; then
              SHOULD_RUN=false
            fi
            if [ "${KST_HOUR}" -ge 9 ]; then
              SHOULD_RUN=false
            fi
          fi

          echo "kst_now=${KST_NOW}"
          echo "target_date=${TARGET_DATE}"
          echo "should_run=${SHOULD_RUN}"
          echo "should_run=${SHOULD_RUN}" >> "${GITHUB_OUTPUT}"
          echo "kst_now=${KST_NOW}" >> "${GITHUB_OUTPUT}"
          echo "target_date=${TARGET_DATE}" >> "${GITHUB_OUTPUT}"

      - name: Setup Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Chrome
        if: steps.gate.outputs.should_run == 'true'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install runtime dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install \
            gspread \
            oauth2client \
            requests \
            beautifulsoup4 \
            selenium \
            webdriver-manager
          python --version
          google-chrome --version || true

      - name: Prepare service account file from secret
        if: steps.gate.outputs.should_run == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "Missing required secret: GOOGLE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi
          mkdir -p .secrets
          printf '%s' "${GOOGLE_SERVICE_ACCOUNT_JSON}" > .secrets/service_account.json
          test -s .secrets/service_account.json

      - name: Run Yangdo internal fuzz loop
        if: steps.gate.outputs.should_run == 'true'
        env:
          JSON_FILE: .secrets/service_account.json
          SHEET_NAME: ${{ github.event.inputs.sheet_name || secrets.SHEET_NAME }}
        run: |
          CYCLES="${{ github.event.inputs.cycles || '2' }}"
          ITER="${{ github.event.inputs.yangdo_iterations_per_cycle || '5000' }}"
          SLEEP="${{ github.event.inputs.sleep_sec || '0.1' }}"
          SEED="${{ github.event.inputs.seed || '20260304' }}"
          if [ -z "${SHEET_NAME}" ]; then
            echo "Missing SHEET_NAME (set workflow input or repository secret SHEET_NAME)"
            exit 1
          fi
          python scripts/run_yangdo_internal_fuzz_loop.py \
            --cycles "${CYCLES}" \
            --iterations-per-cycle "${ITER}" \
            --sleep-sec "${SLEEP}" \
            --seed "${SEED}" \
            --report logs/yangdo_internal_fuzz_latest.json \
            --jsonl logs/yangdo_internal_fuzz_cycles.jsonl

      - name: Run Acquisition internal fuzz loop
        if: steps.gate.outputs.should_run == 'true'
        run: |
          CYCLES="${{ github.event.inputs.cycles || '2' }}"
          ITER="${{ github.event.inputs.acq_iterations_per_cycle || '500' }}"
          SLEEP="${{ github.event.inputs.sleep_sec || '0.1' }}"
          SEED="${{ github.event.inputs.seed || '20260304' }}"
          python scripts/run_acquisition_internal_fuzz_loop.py \
            --cycles "${CYCLES}" \
            --iterations-per-cycle "${ITER}" \
            --sleep-sec "${SLEEP}" \
            --seed "${SEED}" \
            --report logs/acquisition_internal_fuzz_latest.json \
            --jsonl logs/acquisition_internal_fuzz_cycles.jsonl

      - name: Validate test + fix-review chain evidence
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python - <<'PY'
          import json, pathlib, sys

          y = pathlib.Path("logs/yangdo_internal_fuzz_latest.json")
          a = pathlib.Path("logs/acquisition_internal_fuzz_latest.json")
          if not y.exists() or not a.exists():
            print("missing_report", {"yangdo": y.exists(), "acquisition": a.exists()})
            sys.exit(1)

          yj = json.loads(y.read_text(encoding="utf-8", errors="replace"))
          aj = json.loads(a.read_text(encoding="utf-8", errors="replace"))

          errs = []
          if int(yj.get("cycles_done") or 0) <= 0:
            errs.append("yangdo cycles_done <= 0")
          if int(aj.get("cycles_done") or 0) <= 0:
            errs.append("acquisition cycles_done <= 0")

          # Evidence for fix-review path:
          # - Yangdo script has self-heal/recovery counting.
          if "totals" not in yj:
            errs.append("yangdo totals missing")
          # - Acquisition script records recoveries/heal attempts by cycle.
          cycle_rows = list(aj.get("cycle_results") or [])
          if not cycle_rows:
            errs.append("acquisition cycle_results missing")
          else:
            row = cycle_rows[-1]
            if "heal_attempts" not in row or "recoveries" not in row:
              errs.append("acquisition heal/recovery evidence missing")

          if errs:
            print("closed_loop_validation_failed")
            for e in errs:
              print("-", e)
            sys.exit(1)
          print("closed_loop_validation_ok")
          PY

      - name: Build summary
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python - <<'PY'
          import json, pathlib
          y = json.loads(pathlib.Path("logs/yangdo_internal_fuzz_latest.json").read_text(encoding="utf-8", errors="replace"))
          a = json.loads(pathlib.Path("logs/acquisition_internal_fuzz_latest.json").read_text(encoding="utf-8", errors="replace"))

          yt = y.get("totals") or {}
          at = a.get("totals") or {}
          yn = y.get("aggregate_anomaly_counter") or {}
          an = a.get("aggregate_anomaly_counter") or {}

          lines = [
            "## Calculator Internal Autodrive (Remote)",
            "",
            f"- generated_at: `{a.get('generated_at')}`",
            "",
            "### Yangdo",
            f"- cycles_done: `{y.get('cycles_done')}`",
            f"- iterations: `{yt.get('iterations')}`",
            f"- ok_rate_pct: `{yt.get('ok_rate_pct')}`",
            f"- anomaly_rate_pct: `{yt.get('anomaly_rate_pct')}`",
            f"- anomaly_counter: `{yn}`",
            "",
            "### Acquisition",
            f"- cycles_done: `{a.get('cycles_done')}`",
            f"- iterations: `{at.get('iterations')}`",
            f"- ok_rate_pct: `{at.get('ok_rate_pct')}`",
            f"- anomaly_rate_pct: `{at.get('anomaly_rate_pct')}`",
            f"- anomaly_counter: `{an}`",
            "",
            "### Fix-Review Evidence",
            "- acquisition report includes `heal_attempts` + `recoveries` per cycle.",
            "- yangdo/acquisition both produced fresh cycle-level reports.",
          ]
          out = pathlib.Path("logs/calculator_internal_autodrive_summary.md")
          out.write_text("\n".join(lines), encoding="utf-8")
          print(out.read_text(encoding="utf-8"))
          PY
          cat logs/calculator_internal_autodrive_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: calculator-internal-autodrive-report
          path: |
            logs/yangdo_internal_fuzz_latest.json
            logs/yangdo_internal_fuzz_cycles.jsonl
            logs/acquisition_internal_fuzz_latest.json
            logs/acquisition_internal_fuzz_cycles.jsonl
            logs/calculator_internal_autodrive_summary.md
          if-no-files-found: error

      - name: Scheduled skip summary
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Overnight gate blocked this schedule tick."
          echo "KST now: ${{ steps.gate.outputs.kst_now }}"
          echo "Target date: ${{ steps.gate.outputs.target_date }}"
          {
            echo "## Calculator Internal Autodrive (Remote)"
            echo ""
            echo "- gate: skipped"
            echo "- kst_now: \`${{ steps.gate.outputs.kst_now }}\`"
            echo "- target_date: \`${{ steps.gate.outputs.target_date }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
