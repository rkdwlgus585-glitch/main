name: Yangdo Internal Fuzz (Remote)

on:
  workflow_dispatch:
    inputs:
      cycles:
        description: "How many cycles to run"
        required: false
        default: "2"
      iterations_per_cycle:
        description: "Iterations per cycle"
        required: false
        default: "6000"
      sleep_sec:
        description: "Sleep seconds between cycles"
        required: false
        default: "0.1"
      seed:
        description: "Random seed"
        required: false
        default: "20260304"
      sheet_name:
        description: "Override Google Sheet name (optional)"
        required: false
        default: ""
  schedule:
    - cron: "15 */3 * * *"

permissions:
  contents: read

jobs:
  fuzz:
    if: ${{ github.event_name != 'schedule' || vars.ENABLE_REMOTE_FUZZ_SCHEDULE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: "1"
      TZ: "Asia/Seoul"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            gspread \
            oauth2client \
            requests \
            beautifulsoup4 \
            selenium \
            webdriver-manager

      - name: Prepare service account file from secret
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "Missing required secret: GOOGLE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi
          mkdir -p .secrets
          printf '%s' "${GOOGLE_SERVICE_ACCOUNT_JSON}" > .secrets/service_account.json
          test -s .secrets/service_account.json

      - name: Run internal fuzz loop (remote / no KR publish)
        env:
          JSON_FILE: .secrets/service_account.json
          SHEET_NAME: ${{ github.event.inputs.sheet_name || secrets.SHEET_NAME }}
        run: |
          CYCLES="${{ github.event.inputs.cycles || '2' }}"
          ITER="${{ github.event.inputs.iterations_per_cycle || '6000' }}"
          SLEEP="${{ github.event.inputs.sleep_sec || '0.1' }}"
          SEED="${{ github.event.inputs.seed || '20260304' }}"
          if [ -z "${SHEET_NAME}" ]; then
            echo "Missing SHEET_NAME (set workflow input or repository secret SHEET_NAME)"
            exit 1
          fi
          echo "SHEET_NAME=${SHEET_NAME}"
          python scripts/run_yangdo_internal_fuzz_loop.py \
            --cycles "${CYCLES}" \
            --iterations-per-cycle "${ITER}" \
            --sleep-sec "${SLEEP}" \
            --seed "${SEED}" \
            --report logs/yangdo_internal_fuzz_latest.json \
            --jsonl logs/yangdo_internal_fuzz_cycles.jsonl

      - name: Build summary
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("logs/yangdo_internal_fuzz_latest.json")
          if not p.exists():
            print("report_not_found")
            raise SystemExit(1)
          data = json.loads(p.read_text(encoding="utf-8", errors="replace"))
          t = data.get("totals") or {}
          ac = data.get("aggregate_anomaly_counter") or {}
          buckets = list(data.get("aggregate_license_bucket_quality") or [])
          top_bucket_lines = []
          for row in buckets[:8]:
            name = str(row.get("license_bucket") or "")
            rate = row.get("anomaly_rate_pct")
            samples = row.get("samples")
            top_bucket_lines.append(f"  - {name}: anomaly_rate={rate}% (samples={samples})")
          lines = [
            "## Yangdo Internal Fuzz (Remote)",
            "",
            f"- generated_at: `{data.get('generated_at')}`",
            f"- cycles_done: `{data.get('cycles_done')}`",
            f"- iterations: `{t.get('iterations')}`",
            f"- ok_rate_pct: `{t.get('ok_rate_pct')}`",
            f"- anomaly_rate_pct: `{t.get('anomaly_rate_pct')}`",
            f"- aggregate_anomaly_counter: `{ac}`",
          ]
          if top_bucket_lines:
            lines.extend(["", "- worst_license_buckets:", *top_bucket_lines])
          out = pathlib.Path("logs/yangdo_internal_fuzz_summary.md")
          out.write_text("\n".join(lines), encoding="utf-8")
          print(out.read_text(encoding="utf-8"))
          PY
          cat logs/yangdo_internal_fuzz_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yangdo-internal-fuzz-report
          path: |
            logs/yangdo_internal_fuzz_latest.json
            logs/yangdo_internal_fuzz_cycles.jsonl
            logs/yangdo_internal_fuzz_summary.md
          if-no-files-found: error

