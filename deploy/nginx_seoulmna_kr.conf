# =================================================================
# seoulmna.kr nginx reverse proxy configuration
# Production deployment for AI calculators + WordPress + Next.js
# =================================================================

upstream yangdo_api {
    server 127.0.0.1:8200;
    keepalive 4;
}

upstream permit_api {
    server 127.0.0.1:8100;
    keepalive 4;
}

server {
    listen 80;
    server_name seoulmna.kr www.seoulmna.kr;
    return 301 https://seoulmna.kr$request_uri;
}

server {
    listen 443 ssl http2;
    server_name seoulmna.kr;

    # --- SSL (Cloudflare Origin Certificate or Let's Encrypt) ---
    ssl_certificate     /etc/ssl/seoulmna.kr/origin.pem;
    ssl_certificate_key /etc/ssl/seoulmna.kr/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # --- Calculator API reverse proxy ---
    # yangdo estimate
    location /_calc/yangdo {
        proxy_pass http://yangdo_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # CORS headers (engine also sends them, nginx as fallback)
        add_header Access-Control-Allow-Origin "https://seoulmna.kr" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key" always;
        add_header Access-Control-Max-Age 86400;

        # Disable caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # permit precheck
    location /_calc/permit {
        proxy_pass http://permit_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        add_header Access-Control-Allow-Origin "https://seoulmna.kr" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key" always;
        add_header Access-Control-Max-Age 86400;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check (both APIs)
    location /_calc/health {
        proxy_pass http://permit_api/v1/health;
        proxy_read_timeout 5s;
    }

    # --- WordPress (main site) ---
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # --- Static assets cache ---
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Error pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
