# =================================================================
# seoulmna.kr nginx reverse proxy configuration
# Production deployment for AI calculators + WordPress + Next.js
# =================================================================

# --- Rate limiting zones ---
# API: 10 req/s per IP with burst of 20 (covers normal usage with headroom)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# Health: more lenient for monitoring tools
limit_req_zone $binary_remote_addr zone=health_limit:2m rate=30r/s;

# Docker Compose: use service names (container-to-container networking).
# Host-native nginx: change these to 127.0.0.1.
upstream yangdo_api {
    server yangdo-api:8200;
    keepalive 4;
}

upstream permit_api {
    server permit-api:8100;
    keepalive 4;
}

upstream consult_api {
    server consult-api:8788;
    keepalive 4;
}

server {
    listen 80;
    server_name seoulmna.kr www.seoulmna.kr;
    return 301 https://seoulmna.kr$request_uri;
}

server {
    listen 443 ssl http2;
    server_name seoulmna.kr;

    # --- SSL (Cloudflare Origin Certificate or Let's Encrypt) ---
    ssl_certificate     /etc/ssl/seoulmna.kr/origin.pem;
    ssl_certificate_key /etc/ssl/seoulmna.kr/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_types application/json text/plain text/xml text/css application/javascript;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # --- Request size limit for API endpoints ---
    client_max_body_size 128k;

    # --- Calculator API reverse proxy ---
    # yangdo estimate
    location /_calc/yangdo {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://yangdo_api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # CORS headers (engine also sends them, nginx as fallback)
        add_header Access-Control-Allow-Origin "https://seoulmna.kr" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, X-Sandbox" always;
        add_header Access-Control-Expose-Headers "X-Request-Id, X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset" always;
        add_header Access-Control-Max-Age 86400;

        # Disable caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # permit precheck
    location /_calc/permit {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://permit_api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        add_header Access-Control-Allow-Origin "https://seoulmna.kr" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, X-Sandbox" always;
        add_header Access-Control-Expose-Headers "X-Request-Id, X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset" always;
        add_header Access-Control-Max-Age 86400;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # consult intake
    location /_calc/consult {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://consult_api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        add_header Access-Control-Allow-Origin "https://seoulmna.kr" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key, X-Sandbox" always;
        add_header Access-Control-Expose-Headers "X-Request-Id, X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset" always;
        add_header Access-Control-Max-Age 86400;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check (all APIs)
    location /_calc/health {
        limit_req zone=health_limit burst=5 nodelay;
        proxy_pass http://permit_api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 5s;
    }

    # --- WordPress (main site, runs on host outside Docker) ---
    # Docker Compose: use host.docker.internal (requires extra_hosts in compose).
    # Host-native nginx: change these to 127.0.0.1.
    location / {
        proxy_pass http://host.docker.internal:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # --- Static assets cache ---
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Error pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
