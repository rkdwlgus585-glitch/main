[PHP]
extension_dir="ext"
date.timezone=Asia/Seoul
display_errors=On
log_errors=On
output_buffering=4096
memory_limit=512M
post_max_size=64M
upload_max_filesize=64M
max_execution_time=120
default_charset=UTF-8
extension=curl
extension=mbstring
extension=openssl
extension=pdo_sqlite
extension=sqlite3
extension=zip
